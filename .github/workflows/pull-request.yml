name: Pull Request on Branch Push
on:
  push:
    branches:
      - "publish/*"
jobs:
  auto-pull-request:
    name: PullRequestAction
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.EUROPACE_CODE_COMMITTER_APP_ID }}
          private-key: ${{ secrets.EUROPACE_CODE_COMMITTER_PRIVATE_KEY }}
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          BRANCH_NAME: ${{ github.ref_name }}
        run:  |
          gh pr create \
            --base master \
            --head "$BRANCH_NAME" \
            --title "Update from $BRANCH_NAME" \
            --body "This is an automated pull request to update from branch \`$BRANCH_NAME\`."
