name: Pull Request on Branch Push
on:
  push:
    branches-ignore:
      - master
jobs:
  auto-pull-request:
    name: PullRequestAction
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.PROJEN_APP_ID }}
          private-key: ${{ secrets.PROJEN_APP_PRIVATE_KEY }}
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: gh pr create --base master --head "${{ github.ref_name }}" \
                --title "Update from ${{ github.ref_name }}" \
                --body "This is an automated pull request to update from branch \`${{ github.ref_name }}\`."
